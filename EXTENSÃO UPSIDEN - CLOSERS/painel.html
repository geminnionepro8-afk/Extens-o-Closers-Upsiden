<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upsiden — Painel</title>
  <link rel="icon" href="icones/icone48.png" type="image/png">
  <link rel="stylesheet" href="painel.css">
</head>
<body>
  <!-- Loading -->
  <div id="loading-page" class="loading-page">
    <div class="spinner"></div>
    <p>Carregando Painel Upsiden...</p>
  </div>

  <!-- Auth Guard -->
  <div id="auth-guard" style="display:none;">
    <div class="loading-page">
      <div style="text-align:center;">
        <img src="icones/icone128.png" style="width:64px;height:64px;opacity:0.3;margin-bottom:16px;" alt="Upsiden">
        <h2 style="font-size:20px;margin-bottom:8px;">Faça login para acessar o Painel</h2>
        <p style="color:var(--text-muted);font-size:14px;margin-bottom:24px;">Você precisa estar autenticado para usar o Painel Upsiden.</p>
        <button class="btn btn-primary" id="btn-goto-login">Fazer Login</button>
      </div>
    </div>
  </div>

  <!-- Main Layout -->
  <div id="painel-app" class="painel-layout" style="display:none;">

    <!-- ══ SIDEBAR ══ -->
    <aside class="painel-sidebar">
      <div class="sidebar-brand">
        <img src="icones/upsiden_logo.png" alt="Upsiden" onerror="this.src='icones/icone48.png'">
        <span>Upsiden</span>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Principal</div>
        <button class="nav-item active" data-section="dashboard">
          <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
          Dashboard
        </button>
        <button class="nav-item" data-section="audios">
          <svg viewBox="0 0 24 24"><path d="M12 3v9.28A4.39 4.39 0 0010.5 12C8.01 12 6 14.01 6 16.5S8.01 21 10.5 21c2.31 0 4.2-1.75 4.45-4H15V6h4V3h-7z"/></svg>
          Áudios
        </button>
        <button class="nav-item" data-section="documentos">
          <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
          Documentos
        </button>
        <button class="nav-item" data-section="midias">
          <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
          Mídias
        </button>
        <button class="nav-item" data-section="templates">
          <svg viewBox="0 0 24 24"><path d="M21 6h-2v9H6v2c0 1.1.9 2 2 2h11l4 4V8c0-1.1-.9-2-2-2zm-4 2H3c-1.1 0-2 .9-2 2v14l4-4h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2z"/></svg>
          Templates
        </button>

        <div class="nav-section-label">Ferramentas</div>
        <button class="nav-item" data-section="crm">
          <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
          CRM / Funil
        </button>
        <button class="nav-item" data-section="automacoes">
          <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
          Automações
        </button>

        <div class="nav-section-label" id="admin-section-label" style="display:none;">Administração</div>
        <button class="nav-item admin-only" data-section="admin" id="nav-admin" style="display:none;">
          <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
          Gestão de Equipe
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="user-avatar" id="user-avatar">U</div>
        <div class="user-info">
          <div class="user-name" id="user-display-name">Usuário</div>
          <div class="user-role" id="user-display-role">Closer</div>
        </div>
        <button class="btn-logout" id="btn-logout" title="Sair">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        </button>
      </div>
    </aside>

    <!-- ══ MAIN ══ -->
    <main class="painel-main">
      <header class="main-header">
        <h1 id="page-title">Dashboard</h1>
        <div class="header-actions" id="header-actions"></div>
      </header>
      <div class="main-content" id="main-content">
        <!-- Dynamic content loaded here -->
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="supabase_client.js"></script>
  <script src="painel.js"></script>
</body>
</html>
