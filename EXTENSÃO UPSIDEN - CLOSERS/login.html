<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upsiden — Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-app">
    <div class="login-card">
      <div class="login-logo">
        <img src="icones/icone128.png" alt="Upsiden" style="width:56px;height:56px;">
      </div>
      <h1>Upsiden</h1>
      <p class="login-subtitle">Acesse sua conta para continuar</p>

      <form id="form-login" autocomplete="on">
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="field">
          <label for="login-senha">Senha</label>
          <input type="password" id="login-senha" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login" id="btn-entrar">Entrar</button>
      </form>

      <div class="login-divider"><span>ou</span></div>

      <form id="form-registro" style="display:none;">
        <div class="field">
          <label for="reg-nome">Nome</label>
          <input type="text" id="reg-nome" placeholder="Seu nome" required>
        </div>
        <div class="field">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="field">
          <label for="reg-senha">Senha</label>
          <input type="password" id="reg-senha" placeholder="Mínimo 6 caracteres" required minlength="6">
        </div>
        <button type="submit" class="btn-login btn-register">Criar Conta</button>
      </form>

      <button class="btn-toggle" id="btn-toggle">Não tem conta? Criar uma</button>

      <div class="login-status" id="login-status"></div>
    </div>
  </div>
  <script src="supabase_client.js"></script>
  <script src="login.js"></script>
</body>
</html>
