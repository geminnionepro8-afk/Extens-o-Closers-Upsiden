<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upsiden - Painel</title>
  <link rel="icon" href="../../../public/icons/icone48.png" type="image/png">
  <link rel="stylesheet" href="../styles/painel.css">
</head>
<body>
  <!-- Loading -->
  <div id="loading-page" class="loading-page">
    <div class="spinner"></div>
    <p>Carregando Painel Upsiden...</p>
  </div>

  <!-- Auth Guard -->
  <div id="auth-guard" style="display:none;">
    <div class="loading-page">
      <div style="text-align:center;">
        <img src="../../../public/icons/icone128.png" style="width:64px;height:64px;opacity:0.3;margin-bottom:16px;" alt="Upsiden">
        <h2 style="font-size:20px;margin-bottom:8px;">Faca login para acessar o Painel</h2>
        <p style="color:var(--text-muted);font-size:14px;margin-bottom:24px;">Voce precisa estar autenticado para usar o Painel Upsiden.</p>
        <button class="btn btn-primary" id="btn-goto-login">Fazer Login</button>
      </div>
    </div>
  </div>

  <!-- Main Layout -->
  <div id="painel-app" class="painel-layout" style="display:none;">

    <!-- SIDEBAR -->
    <aside class="painel-sidebar" id="painel-sidebar">

      <div class="sidebar-brand">
        <div class="brand-icon">
          <img src="../../../public/icons/up_logo_branca.png" alt="Upsiden" onerror="this.src='../../../public/icons/icone48.png'" class="brand-logo-full">
          <img src="../../../public/icons/up_logo_branca.png" alt="U" class="brand-logo-mini">
        </div>
        <span class="brand-name">Upsiden</span>
        <!-- Toggle Button -->
        <button class="sidebar-toggle" id="sidebar-toggle" title="Expandir/Recolher menu">
          <svg class="icon-expand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M9 3v18"/>
          </svg>
        </button>
      </div>

      <!-- Quick Search -->
      <div class="sidebar-search">
        <svg class="search-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" placeholder="Pesquisa rapida..." id="sidebar-search-input" class="search-text">
        <kbd class="search-kbd">/</kbd>
      </div>

      <!-- Navigation -->
      <nav class="sidebar-nav" id="sidebar-nav">

        <div class="nav-section-label"><span>Visao Geral</span></div>
        <button class="nav-item active" data-section="dashboard" title="Dashboard">
          <div class="nav-icon-wrap">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
              <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
            </svg>
          </div>
          <span class="nav-label">Dashboard</span>
        </button>

        <div class="nav-section-label"><span>Biblioteca</span></div>
        <button class="nav-item" data-section="audios" title="Audios">
          <div class="nav-icon-wrap">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
            </svg>
          </div>
          <span class="nav-label">Audios</span>
        </button>
        <button class="nav-item" data-section="documentos" title="Documentos">
          <div class="nav-icon-wrap">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
          </div>
          <span class="nav-label">Documentos</span>
        </button>
        <button class="nav-item" data-section="midias" title="Midias">
          <div class="nav-icon-wrap">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </div>
          <span class="nav-label">Midias</span>
        </button>
        <button class="nav-item" data-section="templates" title="Templates">
          <div class="nav-icon-wrap">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <span class="nav-label">Templates</span>
        </button>

        <div class="nav-section-label"><span>Ferramentas</span></div>
        <button class="nav-item" data-section="crm" title="CRM / Funil">
          <div class="nav-icon-wrap">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
            </svg>
          </div>
          <span class="nav-label">CRM / Funil</span>
        </button>
        <button class="nav-item" data-section="automacoes" title="Automacoes Classicas">
          <div class="nav-icon-wrap">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
          </div>
          <span class="nav-label">Automacoes Classicas</span>
        </button>
        <button class="nav-item" data-section="flow" title="Automacao Visual (Flow Builder)">
          <div class="nav-icon-wrap" style="background: var(--accent-dim); border-color: var(--accent-glow);">
            <svg class="nav-icon" viewBox="0 0 24 24" style="stroke: var(--accent);">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
          </div>
          <span class="nav-label" style="color: var(--text-primary); font-weight: 500;">Automacao Visual</span>
        </button>
        <button class="nav-item" data-section="campanhas" title="Campanhas">
          <div class="nav-icon-wrap">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </div>
          <span class="nav-label">Campanhas</span>
        </button>

        <div class="nav-section-label" id="admin-section-label" style="display:none;"><span>Administracao</span></div>
        <button class="nav-item" data-section="admin" id="nav-admin" title="Gestao de Equipe" style="display:none;">
          <div class="nav-icon-wrap">
            <svg class="nav-icon" viewBox="0 0 24 24">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </div>
          <span class="nav-label">Gestao de Equipe</span>
        </button>

      </nav>

      <!-- Sidebar Footer / User -->
      <div class="sidebar-footer" id="sidebar-footer">
        <button class="user-card" id="btn-user-menu" title="Menu do usuario">
          <div class="user-avatar" id="user-avatar">U</div>
          <div class="user-info">
            <div class="user-name" id="user-display-name">Usuario</div>
            <div class="user-role" id="user-display-role">Closer</div>
          </div>
          <svg class="user-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>

    </aside>

    <!-- USER MENU POPUP -->
    <div class="user-menu-popup" id="user-menu-popup">
      <div class="user-menu-header">
        <div class="user-avatar-lg" id="user-avatar-popup">U</div>
        <div>
          <div class="ump-name" id="ump-name">Usuario</div>
          <div class="ump-email" id="ump-email">usuario@upsiden.com</div>
        </div>
      </div>
      <div class="user-menu-items">
        <button class="ump-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Perfil
        </button>
        <button class="ump-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="14" y2="12"/><line x1="4" y1="18" x2="18" y2="18"/></svg>
          Preferencias
        </button>
        <button class="ump-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          Notificacoes
        </button>
        <div class="ump-divider"></div>
        <button class="ump-item ump-danger" id="btn-logout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sair
        </button>
      </div>
    </div>
    <!-- Popup overlay -->
    <div class="user-menu-overlay" id="user-menu-overlay"></div>

    <!-- MAIN -->
    <main class="painel-main">
      <header class="main-header">
        <div class="main-header-left">
          <div class="header-breadcrumb">Painel / <span id="breadcrumb-section">Dashboard</span></div>
          <h1 id="page-title">Dashboard</h1>
        </div>
        <div class="presence-stack" id="presence-stack">
          <div class="p-avatar">U</div>
        </div>
        <div class="header-actions" id="header-actions"></div>
      </header>
      <div class="main-content" id="main-content">
        <!-- Dynamic content loaded here -->
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="../../libs/supabase.min.js"></script>
  <script src="../../libs/supabase-config.js"></script>
  <script src="../../services/auth.service.js"></script>
  <script src="../../services/db.service.js"></script>
  <script src="../../services/storage.service.js"></script>
  <script src="../../services/metrics.service.js"></script>
  <script src="painel-helpers.js"></script>
  <script src="painel-dashboard.js"></script>
  <script src="painel-biblioteca.js"></script>
  <script src="painel-templates-crm.js"></script>
  <script src="painel-automacoes.js"></script>
  <script src="painel-flow.js"></script>
  <script src="painel-campanhas.js"></script>
  <script src="painel-admin.js"></script>
  <script src="painel-init.js"></script>
</body>
</html>
