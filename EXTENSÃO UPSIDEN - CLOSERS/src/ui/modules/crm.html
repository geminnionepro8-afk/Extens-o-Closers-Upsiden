<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Upsiden</title>
  <link rel="stylesheet" href="crm.css">
</head>
<body>
  <div class="crm-app">
    <header class="crm-header">
      <h2>Funil de Vendas</h2>
      <button id="btn-add-lead" class="btn-primary">+ Novo Lead</button>
    </header>
    <div class="kanban-board" id="kanban">
      <div class="kanban-column" data-etapa="prospeccao">
        <h3>x} Prospecção <span class="badge">0</span></h3>
        <div class="kanban-cards" id="coluna-prospeccao"></div>
      </div>
      <div class="kanban-column" data-etapa="negociacao">
        <h3>x Negociação <span class="badge">0</span></h3>
        <div class="kanban-cards" id="coluna-negociacao"></div>
      </div>
      <div class="kanban-column" data-etapa="fechado">
        <h3>S& Fechado <span class="badge">0</span></h3>
        <div class="kanban-cards" id="coluna-fechado"></div>
      </div>
    </div>
  </div>
  <script src="../../libs/supabase.min.js"></script>
  <script src="../../libs/supabase-config.js"></script>
  <script src="../../services/auth.service.js"></script><script src="../../services/db.service.js"></script><script src="../../services/storage.service.js"></script><script src="../../services/metrics.service.js"></script>
  <script src="crm.js"></script>
</body>
</html>
