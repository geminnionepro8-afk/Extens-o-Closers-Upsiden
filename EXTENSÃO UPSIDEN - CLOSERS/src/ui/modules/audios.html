<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upsiden  Biblioteca de Áudios</title>
  <link rel="stylesheet" href="audios.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <div class="header-logo">
          <img src="../../../public/icons/upsiden_logo.png" alt="Upsiden Logo" style="height: 24px; max-width: 140px; object-fit: contain;">
        </div>
      </div>
      <button class="btn-icon btn-settings" id="btn-opcoes" title="Configurações">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96a7.04 7.04 0 00-1.62-.94l-.36-2.54a.48.48 0 00-.48-.41h-3.84a.48.48 0 00-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87a.48.48 0 00.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z"/></svg>
      </button>
    </header>

    <!-- Search & Actions Bar -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="input-busca" class="search-input" placeholder="Buscar áudios...">
      </div>
      <label class="btn-primary btn-import" for="input-importar" id="btn-importar" title="Importar Áudios" style="cursor: pointer;">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        <span>Importar</span>
      </label>
      <input type="file" id="input-importar" accept=".mp3,.wav,.ogg,.m4a,.opus,audio/*" multiple style="display:none">
    </div>

    <!-- Category Filter -->
    <div class="categories" id="container-categorias">
      <button class="cat-chip active" data-categoria="todos">Todos</button>
      <button class="cat-chip" style="color: var(--accent); border-color: var(--accent);" data-categoria="equipe">x Time</button>
      <button class="cat-chip" data-categoria="favoritos">⭐ Favoritos</button>
    </div>

    <!-- Audio List -->
    <div class="audio-list" id="lista-audios">
      <!-- Estado vazio -->
      <div class="empty-state" id="estado-vazio">
        <div class="empty-icon">
          <img src="../../../public/icons/icone128.png" alt="Upsiden Icon" style="width: 64px; height: 64px; opacity: 0.15; filter: drop-shadow(0 0 10px rgba(255, 98, 0, 0.2)); margin-bottom: 8px;">
        </div>
        <p class="empty-title">Nenhum áudio na biblioteca</p>
        <p class="empty-desc">Clique em <strong>Importar</strong> para adicionar seus áudios</p>
      </div>
    </div>

    <!-- Status Bar -->
    <footer class="status-bar" id="barra-status">
      <span class="status-text" id="texto-status">Pronto</span>
      <span class="audio-count" id="contagem-audios">0 áudios</span>
    </footer>
  </div>

  <!-- Modal de Edição -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h3>Editar Áudio</h3>
        <button class="btn-icon btn-close-modal" id="btn-fechar-modal">S"</button>
      </div>
      <div class="modal-body">
        <label class="field-label">Nome do Áudio</label>
        <input type="text" id="modal-nome" class="modal-input" placeholder="Ex: Bom dia!">
        <label class="field-label">Pasta</label>
        <select id="modal-pasta" class="modal-input">
          <option value="">Nenhuma Pasta</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-cancelar-modal">Cancelar</button>
        <button class="btn-primary" id="btn-salvar-modal">Salvar</button>
      </div>
    </div>
  </div>

  <script src="../../libs/supabase.min.js"></script>
  <script src="../../libs/supabase-config.js"></script>
  <script src="../../services/auth.service.js"></script><script src="../../services/db.service.js"></script><script src="../../services/storage.service.js"></script><script src="../../services/metrics.service.js"></script>
  <script src="audios.js"></script>
</body>
</html>
