<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca de Áudios - Upsiden</title>
  <link rel="stylesheet" href="../styles/modulo.css">
  <link rel="stylesheet" href="audios.css">
</head>
<body>
  <div class="mod-app">
    
    <!-- Header Controls (Search / Tabs / Import) -->
    <header class="mod-toolbar">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/></svg>
        <input type="text" id="audio-search" class="search-input" placeholder="Buscar áudios...">
      </div>

      <div class="lib-tabs-switcher">
        <button class="lib-tab-btn active" data-lib-tab="audios" onclick="window.parent.switchBibliotecaTab('audios')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          <span>Áudios</span>
          <span class="badge" id="badge-audios">0</span>
        </button>
        <button class="lib-tab-btn" data-lib-tab="documentos" onclick="window.parent.switchBibliotecaTab('documentos')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span>Documentos</span>
          <span class="badge" id="badge-documentos">0</span>
        </button>
        <button class="lib-tab-btn" data-lib-tab="midias" onclick="window.parent.switchBibliotecaTab('midias')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
          <span>Mídias</span>
          <span class="badge" id="badge-midias">0</span>
        </button>
      </div>



      <div class="view-controls">
        <button type="button" class="btn-view-mode" data-view="list" title="Lista">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
        <button type="button" class="btn-view-mode active" data-view="details" title="Detalhes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/></svg>
        </button>
        <button type="button" class="btn-view-mode" data-view="grid" title="Grade">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </button>
        <button type="button" class="btn-view-mode" data-view="big-grid" title="Grade Grande">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
        </button>
      </div>

      <div class="action-buttons">
        <label class="btn-primary-glow" for="audio-upload">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="currentColor"/></svg>
          <span>Importar</span>
        </label>
        <input type="file" id="audio-upload" accept="audio/*" multiple style="display:none">
      </div>
    </header>

    <!-- Table Header (EchoTune Style) -->
    <div class="table-header">
      <div class="col-main">Avatar & Nome do Áudio</div>
      <div class="col-stats">Métricas</div>
      <div class="col-meta">Duração</div>
      <div class="col-actions">Ações</div>
    </div>

    <!-- Structured List -->
    <main class="audio-container" id="audio-list-container">
      <!-- Injected by JS -->
    </main>

    <!-- Empty State -->
    <div class="empty-state" id="audio-empty" style="display:none;">
      <svg viewBox="0 0 24 24" width="64" height="64" opacity="0.1"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" fill="currentColor"/></svg>
      <p>Nenhum áudio encontrado</p>
    </div>

    <!-- Footer Stats -->
    <footer class="mod-footer">
      <span id="audio-count-total">0/0 áudios</span>
      <div class="status-indicator">
        <div class="dot green"></div>
        <span>Sistema Online</span>
      </div>
    </footer>
  </div>

  <!-- Scripts -->
  <script src="../../libs/supabase.min.js"></script>
  <script src="../../libs/supabase-config.js"></script>
  <script src="../../services/auth.service.js"></script>
  <script src="../../services/db.service.js"></script>
  <script src="../../services/storage.service.js"></script>
  <script src="../../services/metrics.service.js"></script>
  <script src="audios.js"></script>
</body>
</html>
