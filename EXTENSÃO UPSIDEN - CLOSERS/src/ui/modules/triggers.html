<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles/modulo.css">
  <style>
    body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg-primary); color: var(--text-primary); font-family: 'Segoe UI', -apple-system, system-ui, sans-serif; box-sizing: border-box; overflow: hidden; }
    
    /* Top Bar */
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--bg-secondary); z-index: 100; position: relative; }
    .top-bar::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--accent-gradient); opacity: 0.6; }
    h2 { color: var(--text-primary); margin: 0; font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px; letter-spacing: -0.3px; }
    
    .toolbar-actions { display: flex; gap: 10px; align-items: center; }
    .btn { background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border); padding: 8px 14px; border-radius: var(--radius-md); font-weight: 500; font-size: 12px; cursor: pointer; transition: all var(--transition); display: flex; align-items: center; gap: 6px; }
    .btn:hover { background: var(--bg-card-hover); border-color: var(--border-light); color: var(--text-primary); }
    .btn.primary { background: var(--accent-gradient); color: #fff; border-color: transparent; font-weight: 600; }
    .btn.primary:hover { transform: translateY(-1px); box-shadow: var(--shadow-glow); }

    /* Canvas / Flow Builder */
    .viewport { flex: 1; position: relative; overflow: hidden; background-color: var(--bg-primary); cursor: grab; }
    .viewport:active { cursor: grabbing; }
    
    .canvas { transform-origin: 0 0; position: absolute; top: 0; left: 0; width: 10000px; height: 10000px; }
    .dot-grid { width: 100%; height: 100%; position: absolute; top: 0; left: 0; background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 20px 20px; pointer-events: none; }
    
    .svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; overflow: visible; }
    .connection-line { stroke: var(--text-muted); stroke-width: 3; fill: none; transition: stroke 0.2s; }
    .connection-line:hover, .connection-line.active { stroke: var(--accent); stroke-width: 4; cursor: pointer; pointer-events: stroke; }
    
    /* Nodes */
    .node { position: absolute; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); width: 260px; box-shadow: var(--shadow-md); z-index: 20; cursor: move; transition: box-shadow 0.2s, border-color 0.2s; display: flex; flex-direction: column; }
    .node:hover { box-shadow: var(--shadow-lg); border-color: var(--border-light); }
    .node.selected { border-width: 2px; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    
    .node-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
    .node-title { font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .node-body { padding: 14px 16px; flex: 1; font-size: 12px; color: var(--text-muted); }
    .node-data { background: var(--bg-primary); padding: 8px; border-radius: var(--radius-sm); font-family: 'Cascadia Code', monospace; font-size: 11px; margin-top: 8px; color: var(--text-primary); word-break: break-all; max-height: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; border: 1px solid var(--border); }
    
    /* Variantes de Nó */
    .node.type-trigger .node-header { background: rgba(255,98,0,0.08); border-bottom-color: rgba(255,98,0,0.15); }
    .node.type-trigger .node-title { color: var(--accent); }
    
    .node.type-condition .node-header { background: rgba(245,158,11,0.08); border-bottom-color: rgba(245,158,11,0.15); }
    .node.type-condition .node-title { color: var(--warning); }
    
    .node.type-action .node-header { background: rgba(59,130,246,0.08); border-bottom-color: rgba(59,130,246,0.15); }
    .node.type-action .node-title { color: var(--info); }

    /* Conectores (Handles) */
    .handle { position: absolute; width: 14px; height: 14px; background: var(--bg-card); border: 2px solid var(--text-muted); border-radius: 50%; z-index: 30; cursor: crosshair; transition: 0.2s; }
    .handle:hover { transform: scale(1.3); background: var(--accent); border-color: var(--accent); box-shadow: var(--shadow-glow); }
    .handle.input { left: -8px; top: 50%; transform: translateY(-50%); }
    .handle.output { right: -8px; top: 50%; transform: translateY(-50%); }

    /* Menu Lateral Contextual (Inspector) */
    .inspector-overlay { position: fixed; top: 0; right: 0; bottom: 0; width: 340px; background: var(--bg-secondary); border-left: 1px solid var(--border); z-index: 200; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: -8px 0 32px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
    .inspector-overlay.open { transform: translateX(0); }
    
    .ins-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .ins-title { font-weight: 700; font-size: 14px; color: var(--text-primary); }
    .btn-close { background: transparent; border: none; color: var(--text-muted); cursor: pointer; border-radius: 50%; padding: 4px; display: flex; align-items: center; justify-content: center; transition: var(--transition-fast); }
    .btn-close:hover { background: rgba(239,68,68,0.1); color: var(--danger); }
    
    .ins-body { padding: 20px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    
    /* Formulários no Inspector */
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-input { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; color: var(--text-primary); font-size: 13px; outline: none; transition: border-color var(--transition); }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    select.form-input { appearance: none; cursor: pointer; }
    .form-textarea { resize: vertical; min-height: 100px; font-family: inherit; }
    
    .ins-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
    
    /* UI Flutuante */
    .zoom-controls { position: absolute; bottom: 20px; left: 20px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-md); display: flex; padding: 4px; z-index: 100; box-shadow: var(--shadow-md); }
    .btn-icon { background: transparent; border: none; color: var(--text-muted); width: 32px; height: 32px; border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all var(--transition-fast); }
    .btn-icon:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .zoom-text { color: var(--text-secondary); font-size: 11px; font-weight: 600; width: 44px; text-align: center; line-height: 32px; user-select: none; }
  </style>
</head>
<body>

  <!-- Menu Superior -->
  <div class="top-bar">
    <h2>
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
      Construtor Lógico (Cérebro)
    </h2>
    <div class="toolbar-actions">
      <button class="btn" id="btn-add-trigger">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="var(--accent)"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        + Gatilho
      </button>
      <button class="btn" id="btn-add-action">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="var(--info)"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        + Resposta
      </button>
      <button class="btn primary" id="btn-save-flow">Salvar Cérebro</button>
    </div>
  </div>

  <!-- Area de Trabalho -->
  <div class="viewport" id="viewport">
    <div class="canvas" id="canvas">
      <div class="dot-grid"></div>
      <svg class="svg-layer" id="svg-layer">
        <!-- Linhas conectadas desenhadas via JS -->
      </svg>
      <!-- Nós renderizados via JS -->
    </div>
    
    <div class="zoom-controls">
      <button class="btn-icon" id="btn-zoom-out"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19 13H5v-2h14v2z"/></svg></button>
      <div class="zoom-text" id="zoom-text">100%</div>
      <button class="btn-icon" id="btn-zoom-in"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></button>
    </div>
  </div>

  <!-- Inspector Overlay (Lateral) -->
  <div class="inspector-overlay" id="inspector">
    <div class="ins-header">
      <div class="ins-title" id="ins-title">Editar Nó</div>
      <button class="btn-close" id="btn-close-ins"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
    </div>
    <div class="ins-body" id="ins-body">
      <!-- Injetado dinamicamente dependendo do Node Type -->
    </div>
    <div class="ins-footer">
      <button class="btn" id="btn-delete-node" style="color: var(--danger); border-color: transparent;">Excluir Nó</button>
      <button class="btn primary" id="btn-save-node" style="flex: 1; justify-content: center;">Confirmar</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../../libs/supabase.min.js"></script>
  <script src="../../libs/supabase-config.js"></script>
  <script src="../../services/auth.service.js"></script>
  <script src="../../services/db.service.js"></script>
  <script src="../../services/storage.service.js"></script>
  <script src="../../services/metrics.service.js"></script>
  <script src="triggers.js"></script>
</body>
</html>
