<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão da Equipe</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="mod-app">
    <header class="mod-header">
      <div class="header-title">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="var(--primary-color)"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
        <h2>Gestão da Equipe</h2>
      </div>
      <div class="tabs-header">
        <button class="tab-btn active" data-tab="equipe">Equipe</button>
        <button class="tab-btn" data-tab="arquivos">Arquivos Globais</button>
      </div>
    </header>

    <div id="restrito-view" class="mod-empty" style="display:none;">
      <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="var(--danger-color)" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
      <p style="color:var(--danger-color); font-size: 18px; margin-top:16px;">Acesso Restrito</p>
      <p class="sub">Apenas administradores podem acessar a gestão.</p>
    </div>

    <!-- Tabela de Equipe -->
    <div id="tab-equipe" class="tab-content">
      <div class="team-list" id="lista-equipe">
        <div class="loading-spinner"></div>
      </div>
    </div>

    <!-- Tabela de Arquivos Globais -->
    <div id="tab-arquivos" class="tab-content" style="display:none;">
      <div class="mod-search">
        <input type="text" id="admin-busca" placeholder="Buscar por arquivo ou closer...">
      </div>
      <div class="file-list" id="lista-arquivos">
        <div class="loading-spinner"></div>
      </div>
    </div>

  </div>

  <script src="../../libs/supabase.min.js"></script>
  <script src="../../libs/supabase-config.js"></script>
  <script src="../../services/auth.service.js"></script><script src="../../services/db.service.js"></script><script src="../../services/storage.service.js"></script><script src="../../services/metrics.service.js"></script>
  <script src="admin.js"></script>
</body>
</html>
