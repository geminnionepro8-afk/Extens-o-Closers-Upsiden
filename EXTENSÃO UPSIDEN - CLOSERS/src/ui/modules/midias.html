<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mídias</title>
  <link rel="stylesheet" href="../styles/modulo.css">
  <link rel="stylesheet" href="midias.css">
</head>
<body>
  <div class="mod-app">
    <!-- Filters & Search -->
    <div class="module-controls">
      <div class="mod-search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="media-busca" placeholder="Buscar mídias...">
      </div>

      <label class="btn-import-main" for="media-upload">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        <span>Importar</span>
      </label>
      <input type="file" id="media-upload" accept="image/*,video/*" multiple style="display:none">
    </div>

    <!-- Table Header -->
    <div class="mod-table-header">
      <div class="col-main">Download / Prévia</div>
      <div class="col-stats">Propriedades</div>
      <div class="col-meta">Data</div>
      <div class="col-actions">Controles</div>
    </div>

    <div class="mod-list module-structured-list" id="media-grid"></div>

    <div class="mod-empty" id="media-vazio" style="display:none;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1" opacity="0.3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
      <p style="margin-top:16px;">Nenhuma mídia encontrada</p>
    </div>

    <footer class="mod-footer">
      <span id="media-count">0 mídias</span>
    </footer>
  </div>

  <script src="../../libs/supabase.min.js"></script>
  <script src="../../libs/supabase-config.js"></script>
  <script src="../../services/auth.service.js"></script><script src="../../services/db.service.js"></script><script src="../../services/storage.service.js"></script><script src="../../services/metrics.service.js"></script>
  <script src="midias.js"></script>
</body>
</html>
