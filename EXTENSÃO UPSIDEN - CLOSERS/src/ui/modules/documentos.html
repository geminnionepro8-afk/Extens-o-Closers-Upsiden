<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentos</title>
  <link rel="stylesheet" href="../styles/modulo.css">
  <link rel="stylesheet" href="documentos.css">
</head>
<body>
  <div class="mod-app">
    <!-- Header Controls (Search / Tabs / Import) -->
    <header class="mod-toolbar">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="doc-busca" class="search-input" placeholder="Buscar documentos...">
      </div>

      <div class="selector-group">
        <button class="selector-item lib-tab-btn" data-lib-tab="audios">
           <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
           Áudios <span class="badge" id="badge-audios">0</span>
        </button>
        <button class="selector-item lib-tab-btn active" data-lib-tab="documentos">
           <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
           Documentos <span class="badge" id="badge-documentos">0</span>
        </button>
        <button class="selector-item lib-tab-btn" data-lib-tab="midias">
           <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
           Mídias <span class="badge" id="badge-midias">0</span>
        </button>
      </div>





      <div class="view-controls">
        <button type="button" class="btn-view-mode" data-view="list" title="Lista">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
        <button type="button" class="btn-view-mode active" data-view="details" title="Detalhes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/></svg>
        </button>
        <button type="button" class="btn-view-mode" data-view="grid" title="Grade">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </button>
        <button type="button" class="btn-view-mode" data-view="big-grid" title="Grade Grande">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
        </button>
      </div>

      <div class="action-buttons">
        <label class="btn-primary-glow" for="doc-upload">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          <span>Importar</span>
        </label>
        <input type="file" id="doc-upload" multiple style="display:none">
      </div>
    </header>

    <!-- Table Header -->
    <div class="mod-table-header">
      <div class="col-main">Documento</div>
      <div class="col-stats">Propriedades</div>
      <div class="col-meta">Data</div>
      <div class="col-actions">Controles</div>
    </div>

    <div class="mod-list module-structured-list" id="doc-lista"></div>

    <div class="mod-empty" id="doc-vazio" style="display:none;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1" opacity="0.3"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p style="margin-top:16px;">Nenhum documento encontrado</p>
    </div>

    <footer class="mod-footer">
      <span id="doc-count">0 documentos</span>
    </footer>
  </div>

  <script src="../../libs/supabase.min.js"></script>
  <script src="../../libs/supabase-config.js"></script>
  <script src="../../services/auth.service.js"></script><script src="../../services/db.service.js"></script><script src="../../services/storage.service.js"></script><script src="../../services/metrics.service.js"></script>
  <script src="documentos.js"></script>
</body>
</html>
